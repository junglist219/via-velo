<div class="import-container">
  <input
    #fileInput
    type="file"
    accept=".gpx"
    class="hidden-input"
    (change)="onFileChange($event)"
  />
  <button class="import-btn" (click)="fileInput.click()">GPX importieren</button>
  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
</div>
